<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store TV - Pick / Pack / Delivery</title>
  <link rel="stylesheet" href="/static/tv.css">
  <style>
    body { overflow: hidden; }

    /* ── 3-column layout ── */
    .three-col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      height: 100%;
      padding: 0.7rem 1rem;
    }

    /* ── column ── */
    .col {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .col-header {
      padding: 0.5rem 1rem;
      border-radius: 10px 10px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .col-header.pick     { background: #1158a8; }
    .col-header.pack     { background: #7d5a00; }
    .col-header.delivery { background: #1a5e2a; }

    .col-title { font-weight: bold; font-size: 1.2rem; letter-spacing: 0.05em; }
    .col-count { font-size: 0.85rem; background: rgba(0,0,0,0.3);
                 padding: 0.1rem 0.5rem; border-radius: 10px; }

    .col-body { overflow-y: auto; flex: 1; padding: 0.5rem; display: flex;
                flex-direction: column; gap: 0.4rem; }

    /* ── SO card ── */
    .so-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 7px;
      padding: 0.5rem 0.7rem;
    }

    .so-top  { display: flex; justify-content: space-between; align-items: center; }
    .so-name { font-weight: bold; color: #58a6ff; font-size: 1rem; }
    .so-cnt  { font-size: 0.8rem; color: #8b949e; }
    .so-cust { font-size: 0.82rem; color: #adbac7; margin: 0.15rem 0;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── picking badges ── */
    .badges { display: flex; gap: 0.25rem; flex-wrap: wrap; margin-top: 0.35rem; }
    .badge {
      font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 4px;
      border: 1px solid #444; display: flex; flex-direction: column;
      align-items: center; min-width: 3.5rem;
    }
    .badge b    { font-size: 0.72rem; }
    .badge span { font-size: 0.65rem; margin-top: 1px; }

    .col.pick     .badge { border-color: #388bfd; background: #0d2340; }
    .col.pack     .badge { border-color: #d29922; background: #2a1f00; }
    .col.delivery .badge { border-color: #238636; background: #0d2818; }

    .state-assigned  .badge span { color: #3fb950; }
    .state-confirmed .badge span { color: #d29922; }
    .state-waiting   .badge span { color: #f85149; }
    .state-draft     .badge span { color: #8b949e; }

    main { flex: 1; overflow: hidden; padding: 0; }
  </style>
</head>
<body class="store">
  <header>
    <h1>Pick / Pack / Delivery</h1>
    <div id="summary" style="font-size:0.95rem;color:#8b949e;"></div>
    <div id="clock"></div>
    <div id="last-updated"></div>
  </header>

  <main>
    <div class="three-col">
      <div class="col pick">
        <div class="col-header pick">
          <span class="col-title">PICK</span>
          <span class="col-count" id="cnt-pick">0 SO</span>
        </div>
        <div class="col-body" id="body-pick"></div>
      </div>
      <div class="col pack">
        <div class="col-header pack">
          <span class="col-title">PACK</span>
          <span class="col-count" id="cnt-pack">0 SO</span>
        </div>
        <div class="col-body" id="body-pack"></div>
      </div>
      <div class="col delivery">
        <div class="col-header delivery">
          <span class="col-title">DELIVERY</span>
          <span class="col-count" id="cnt-delivery">0 SO</span>
        </div>
        <div class="col-body" id="body-delivery"></div>
      </div>
    </div>
  </main>

  <script src="/static/tv.js"></script>
  <script>
    function renderColumn(colKey, sos) {
      const body = document.getElementById("body-" + colKey);
      const cnt  = document.getElementById("cnt-"  + colKey);
      cnt.textContent = sos.length + " SO";

      if (sos.length === 0) {
        body.innerHTML = '<p style="color:#555;padding:1rem;text-align:center;">ไม่มีรายการ</p>';
        return;
      }

      body.innerHTML = sos.map(s => `
        <div class="so-card">
          <div class="so-top">
            <span class="so-name">${s.so}</span>
            <span class="so-cnt">${s.count} ใบ</span>
          </div>
          <div class="so-cust">${s.customer}</div>
          <div class="badges">
            ${s.pickings.map(p => `
              <div class="badge state-${p.state}" title="${p.name}">
                <b>${p.name}</b>
                <span>${p.state_label}</span>
              </div>`).join("")}
          </div>
        </div>`).join("");
    }

    async function fetchData() {
      try {
        const res  = await fetch("/api/store/pickings");
        const json = await res.json();
        const data = json.data;

        const total = ["pick","pack","delivery"].reduce((s,k) => s + (data[k]?.length || 0), 0);
        document.getElementById("summary").textContent = `รวม ${total} SO`;

        ["pick", "pack", "delivery"].forEach(col => renderColumn(col, data[col] || []));

        document.getElementById("last-updated").textContent =
          "อัปเดต: " + new Date().toLocaleTimeString("th-TH");
      } catch(e) { console.error(e); }
    }

    startClock();
    fetchData();
    setInterval(fetchData, 10000);
  </script>
</body>
</html>
