<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ขึ้นรถ — เส้นทางจัดส่ง</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: #161b22;
      border-bottom: 2px solid #30363d;
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-shrink: 0;
    }
    #btn-back {
      background: #30363d;
      border: none;
      color: #e6edf3;
      font-size: 1.4rem;
      width: 2.6rem; height: 2.6rem;
      border-radius: 8px;
      cursor: pointer;
      display: none;
      align-items: center; justify-content: center;
    }
    #btn-back:active { background: #484f58; }
    header h1 { font-size: 1.3rem; flex: 1; }
    #header-sub { font-size: 0.85rem; color: #8b949e; }

    /* ── SCREENS ── */
    .screen { display: none; flex: 1; flex-direction: column; }
    .screen.active { display: flex; }

    /* ══════════════════════════════════════════
       SCREEN 1 — Route buttons
    ══════════════════════════════════════════ */
    #screen-routes {
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      gap: 1rem;
    }

    .route-btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 900px;
    }

    .route-btn {
      border: none;
      border-radius: 18px;
      padding: 2rem 1.5rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      transition: transform 0.12s, filter 0.12s;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .route-btn:active { transform: scale(0.96); filter: brightness(0.85); }

    .route-btn .btn-icon  { font-size: 3rem; line-height: 1; }
    .route-btn .btn-name  { font-size: 1.6rem; font-weight: 700; }
    .route-btn .btn-count {
      font-size: 1rem;
      background: rgba(0,0,0,0.25);
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-weight: 600;
    }

    #loading-routes {
      color: #8b949e;
      font-size: 1.2rem;
      text-align: center;
      padding: 3rem;
    }

    /* ══════════════════════════════════════════
       SCREEN 2 — SO Table
    ══════════════════════════════════════════ */
    #screen-table {
      overflow: hidden;
    }

    .table-toolbar {
      padding: 0.7rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #lbl-route-name {
      font-size: 1.1rem;
      font-weight: 700;
      flex: 1;
    }
    #lbl-so-count { font-size: 0.85rem; color: #8b949e; }

    .btn-select-all {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 0.45rem 1rem;
      border-radius: 7px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn-select-all:active { background: #30363d; }

    #btn-confirm-dispatch {
      background: #238636;
      border: none;
      color: #fff;
      padding: 0.55rem 1.4rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    #btn-confirm-dispatch:disabled {
      background: #21262d;
      color: #484f58;
      cursor: not-allowed;
    }
    #btn-confirm-dispatch:not(:disabled):active { background: #2ea043; }

    .table-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }
    thead th {
      position: sticky;
      top: 0;
      background: #161b22;
      padding: 0.55rem 0.7rem;
      text-align: left;
      font-weight: 600;
      color: #8b949e;
      border-bottom: 2px solid #30363d;
      white-space: nowrap;
      z-index: 2;
    }
    thead th:first-child { text-align: center; width: 2.8rem; }

    tbody tr {
      border-bottom: 1px solid #21262d;
      transition: background 0.1s;
    }
    tbody tr.row-selected { background: #1a2535; }
    tbody tr:active { background: #21262d; }

    tbody td {
      padding: 0.55rem 0.7rem;
      vertical-align: middle;
    }
    tbody td:first-child { text-align: center; }

    .cb-row {
      width: 1.3rem; height: 1.3rem;
      accent-color: #238636;
      cursor: pointer;
    }

    .td-so   { font-family: monospace; font-weight: 700; color: #58a6ff; white-space: nowrap; }
    .td-cust { color: #e6edf3; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .td-prov { color: #8b949e; white-space: nowrap; }
    .td-car  { color: #d29922; white-space: nowrap; }

    .bill-tick { color: #3fb950; font-size: 1.2rem; text-align: center; }
    .bill-none { color: #30363d; font-size: 1.1rem; text-align: center; }

    .td-num { text-align: right; font-variant-numeric: tabular-nums; padding-right: 1rem; }

    .td-note input {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 5px;
      color: #e6edf3;
      padding: 0.3rem 0.5rem;
      font-size: 0.85rem;
      width: 140px;
    }
    .td-note input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    #no-sos {
      text-align: center;
      color: #8b949e;
      padding: 3rem;
      font-size: 1rem;
    }

    /* ══════════════════════════════════════════
       MODAL — Confirm dispatch info
    ══════════════════════════════════════════ */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 1.6rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    #modal h2 { font-size: 1.2rem; }
    #modal .selected-summary {
      background: #0d1117;
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      font-size: 0.85rem;
      color: #8b949e;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.6;
    }
    #modal .selected-summary span { color: #58a6ff; font-family: monospace; margin-right: 0.4rem; }

    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group label { font-size: 0.85rem; color: #8b949e; }
    .form-group input {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 1.05rem;
      padding: 0.6rem 0.8rem;
    }
    .form-group input:focus { outline: none; border-color: #58a6ff; }

    .modal-actions { display: flex; gap: 0.7rem; margin-top: 0.3rem; }
    #btn-modal-cancel {
      flex: 1;
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 0.7rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    #btn-modal-send {
      flex: 2;
      background: #238636;
      border: none;
      color: #fff;
      padding: 0.7rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    #btn-modal-send:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    #btn-modal-send:not(:disabled):active { background: #2ea043; }

    /* ══════════════════════════════════════════
       SUCCESS toast
    ══════════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #238636;
      color: #fff;
      padding: 0.8rem 1.6rem;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      display: none;
      z-index: 200;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #toast.show { display: block; animation: fadeInUp 0.3s ease; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <button id="btn-back" title="กลับ">←</button>
    <h1 id="header-title">เลือกเส้นทางจัดส่ง</h1>
    <span id="header-sub"></span>
  </header>

  <!-- SCREEN 1: Route buttons -->
  <div id="screen-routes" class="screen active">
    <div id="loading-routes">กำลังโหลด...</div>
    <div class="route-btn-grid" id="route-grid" style="display:none;"></div>
  </div>

  <!-- SCREEN 2: SO table -->
  <div id="screen-table" class="screen">
    <div class="table-toolbar">
      <span id="lbl-route-name"></span>
      <span id="lbl-so-count"></span>
      <button class="btn-select-all" id="btn-select-all">เลือกทั้งหมด</button>
      <button id="btn-confirm-dispatch" disabled>✔ ยืนยันขึ้นรถ (0)</button>
    </div>
    <div class="table-wrap">
      <table id="so-table">
        <thead>
          <tr>
            <th></th>
            <th>S.O.</th>
            <th>ลูกค้า</th>
            <th>จังหวัด</th>
            <th>ขนส่ง</th>
            <th style="text-align:center;">บิลจริง</th>
            <th style="text-align:right;padding-right:1rem;">แพ็ค</th>
            <th style="text-align:right;padding-right:1rem;">ชิ้น</th>
            <th>หมายเหตุ</th>
          </tr>
        </thead>
        <tbody id="so-tbody"></tbody>
      </table>
      <p id="no-sos" style="display:none;">ไม่มีรายการ</p>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay">
    <div id="modal">
      <h2>🚚 ยืนยันขึ้นรถ</h2>
      <div class="selected-summary" id="modal-so-list"></div>

      <div class="form-group">
        <label>ทะเบียนรถ *</label>
        <input id="inp-plate" type="text" placeholder="เช่น กข 1234 กทม" autocomplete="off">
      </div>
      <div class="form-group">
        <label>ชื่อคนขับ *</label>
        <input id="inp-driver" type="text" placeholder="ชื่อคนขับ" autocomplete="off">
      </div>
      <div class="form-group">
        <label>เวลาออกรถ *</label>
        <input id="inp-time" type="text" placeholder="HH:MM" autocomplete="off">
      </div>

      <div class="modal-actions">
        <button id="btn-modal-cancel">ยกเลิก</button>
        <button id="btn-modal-send" disabled>ยืนยัน</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    let currentRoute = null;
    let soData       = [];       // array of SO objects from API
    let selectedIds  = new Set();// so_id (int) set
    let noteMap      = {};       // so_id → note string

    // ── Helpers ──────────────────────────────────────────────────────────────
    function thaiNow() {
      const d = new Date();
      const offset = 7 * 60;
      const thai = new Date(d.getTime() + (offset + d.getTimezoneOffset()) * 60000);
      const hh = String(thai.getHours()).padStart(2, "0");
      const mm = String(thai.getMinutes()).padStart(2, "0");
      return `${hh}:${mm}`;
    }

    function showToast(msg, ms = 2800) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), ms);
    }

    // ── Screen navigation ────────────────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function goBack() {
      if (document.getElementById("screen-table").classList.contains("active")) {
        showScreen("screen-routes");
        document.getElementById("btn-back").style.display = "none";
        document.getElementById("header-title").textContent = "เลือกเส้นทางจัดส่ง";
        document.getElementById("header-sub").textContent = "";
        currentRoute = null;
      }
    }

    document.getElementById("btn-back").addEventListener("click", goBack);

    // ── Screen 1: Load routes ─────────────────────────────────────────────────
    async function loadRoutes() {
      try {
        const res  = await fetch("/api/dispatch/routes");
        const json = await res.json();
        const routes = json.data || [];

        document.getElementById("loading-routes").style.display = "none";
        const grid = document.getElementById("route-grid");
        grid.style.display = "";

        if (!routes.length) {
          grid.innerHTML = "<p style='color:#8b949e;grid-column:1/-1;text-align:center;padding:2rem;'>ไม่มีรายการรอขึ้นรถ</p>";
          return;
        }

        grid.innerHTML = routes.map(r => `
          <button class="route-btn" style="background:${r.color};"
                  onclick="openRoute(${JSON.stringify(r.route)}, ${JSON.stringify(r.color)})">
            <span class="btn-icon">${r.icon}</span>
            <span class="btn-name">${r.route}</span>
            <span class="btn-count">${r.so_count} SO รอขึ้นรถ</span>
          </button>
        `).join("");
      } catch(e) {
        document.getElementById("loading-routes").textContent = "โหลดข้อมูลไม่ได้ กรุณา Refresh";
        console.error(e);
      }
    }

    // ── Screen 2: Open route ─────────────────────────────────────────────────
    async function openRoute(routeName, color) {
      currentRoute = routeName;
      showScreen("screen-table");
      document.getElementById("btn-back").style.display = "flex";
      document.getElementById("header-title").textContent = routeName;

      const nameEl = document.getElementById("lbl-route-name");
      nameEl.textContent = routeName;
      nameEl.style.color = color;

      document.getElementById("lbl-so-count").textContent = "กำลังโหลด...";
      document.getElementById("so-tbody").innerHTML = "";
      document.getElementById("no-sos").style.display = "none";
      selectedIds = new Set();
      noteMap = {};
      updateConfirmBtn();

      try {
        const res  = await fetch("/api/dispatch/route?name=" + encodeURIComponent(routeName));
        const json = await res.json();
        soData = (json.data && json.data.sos) || [];
        renderTable(soData);
      } catch(e) {
        document.getElementById("lbl-so-count").textContent = "โหลดไม่ได้";
        console.error(e);
      }
    }

    function renderTable(sos) {
      const tbody = document.getElementById("so-tbody");
      document.getElementById("lbl-so-count").textContent = `${sos.length} SO`;

      if (!sos.length) {
        tbody.innerHTML = "";
        document.getElementById("no-sos").style.display = "block";
        return;
      }
      document.getElementById("no-sos").style.display = "none";

      // pre-select all
      selectedIds = new Set(sos.map(s => s.so_id));
      noteMap = {};

      tbody.innerHTML = sos.map(s => {
        const billMark = s.received
          ? `<span class="bill-tick">✔</span>`
          : `<span class="bill-none">—</span>`;
        return `
          <tr id="row-${s.so_id}" class="row-selected" onclick="toggleRow(${s.so_id}, event)">
            <td><input type="checkbox" class="cb-row" id="cb-${s.so_id}" checked
                       onclick="toggleRow(${s.so_id}, event)"></td>
            <td class="td-so">${s.so}</td>
            <td class="td-cust" title="${s.customer}">${s.customer}</td>
            <td class="td-prov">${s.province}</td>
            <td class="td-car">${s.carrier}</td>
            <td style="text-align:center;">${billMark}</td>
            <td class="td-num">${s.packages}</td>
            <td class="td-num">${s.qty}</td>
            <td class="td-note" onclick="event.stopPropagation()">
              <input type="text" placeholder="หมายเหตุ..."
                     oninput="noteMap[${s.so_id}] = this.value"
                     onclick="event.stopPropagation()">
            </td>
          </tr>`;
      }).join("");

      updateConfirmBtn();
    }

    function toggleRow(soId, e) {
      if (e && e.target && (e.target.tagName === "INPUT" && e.target.type === "text")) return;
      if (selectedIds.has(soId)) {
        selectedIds.delete(soId);
        document.getElementById("row-" + soId).classList.remove("row-selected");
        document.getElementById("cb-" + soId).checked = false;
      } else {
        selectedIds.add(soId);
        document.getElementById("row-" + soId).classList.add("row-selected");
        document.getElementById("cb-" + soId).checked = true;
      }
      updateConfirmBtn();
    }

    document.getElementById("btn-select-all").addEventListener("click", () => {
      const allSelected = selectedIds.size === soData.length;
      if (allSelected) {
        selectedIds.clear();
        soData.forEach(s => {
          document.getElementById("row-" + s.so_id).classList.remove("row-selected");
          document.getElementById("cb-" + s.so_id).checked = false;
        });
      } else {
        soData.forEach(s => {
          selectedIds.add(s.so_id);
          document.getElementById("row-" + s.so_id).classList.add("row-selected");
          document.getElementById("cb-" + s.so_id).checked = true;
        });
      }
      updateConfirmBtn();
    });

    function updateConfirmBtn() {
      const btn = document.getElementById("btn-confirm-dispatch");
      const n   = selectedIds.size;
      btn.disabled  = n === 0;
      btn.textContent = `✔ ยืนยันขึ้นรถ (${n})`;
    }

    // ── Modal ────────────────────────────────────────────────────────────────
    document.getElementById("btn-confirm-dispatch").addEventListener("click", openModal);

    function openModal() {
      if (!selectedIds.size) return;

      // build SO list display
      const selected = soData.filter(s => selectedIds.has(s.so_id));
      document.getElementById("modal-so-list").innerHTML =
        selected.map(s => `<span>${s.so}</span>${s.customer}`).join("<br>");

      // pre-fill time
      document.getElementById("inp-time").value = thaiNow();

      validateModal();
      document.getElementById("modal-overlay").classList.add("open");
    }

    document.getElementById("btn-modal-cancel").addEventListener("click", () => {
      document.getElementById("modal-overlay").classList.remove("open");
    });
    document.getElementById("modal-overlay").addEventListener("click", e => {
      if (e.target === document.getElementById("modal-overlay"))
        document.getElementById("modal-overlay").classList.remove("open");
    });

    ["inp-plate","inp-driver","inp-time"].forEach(id => {
      document.getElementById(id).addEventListener("input", validateModal);
    });

    function validateModal() {
      const ok = document.getElementById("inp-plate").value.trim() &&
                 document.getElementById("inp-driver").value.trim() &&
                 document.getElementById("inp-time").value.trim();
      document.getElementById("btn-modal-send").disabled = !ok;
    }

    document.getElementById("btn-modal-send").addEventListener("click", async () => {
      const plate  = document.getElementById("inp-plate").value.trim();
      const driver = document.getElementById("inp-driver").value.trim();
      const time   = document.getElementById("inp-time").value.trim();
      if (!plate || !driver || !time) return;

      const btn = document.getElementById("btn-modal-send");
      btn.disabled = true;
      btn.textContent = "กำลังส่ง...";

      const notesObj = {};
      selectedIds.forEach(id => {
        if (noteMap[id]) notesObj[String(id)] = noteMap[id];
      });

      try {
        const res = await fetch("/api/dispatch/confirm", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            route:       currentRoute,
            so_ids:      [...selectedIds],
            plate:       plate,
            driver:      driver,
            depart_time: time,
            notes:       notesObj,
          }),
        });
        const json = await res.json();
        if (json.ok) {
          document.getElementById("modal-overlay").classList.remove("open");
          showToast(`✅ ยืนยันขึ้นรถ ${json.confirmed} SO เรียบร้อย`);
          // Remove confirmed SOs from table
          selectedIds.forEach(id => {
            const row = document.getElementById("row-" + id);
            if (row) row.remove();
          });
          soData = soData.filter(s => !selectedIds.has(s.so_id));
          selectedIds.clear();
          updateConfirmBtn();
          document.getElementById("lbl-so-count").textContent = `${soData.length} SO`;
          if (!soData.length) document.getElementById("no-sos").style.display = "block";
          // Reset fields
          document.getElementById("inp-plate").value  = "";
          document.getElementById("inp-driver").value = "";
        } else {
          alert("เกิดข้อผิดพลาด: " + (json.detail || "unknown"));
        }
      } catch(e) {
        alert("เกิดข้อผิดพลาด กรุณาลองใหม่");
        console.error(e);
      } finally {
        btn.disabled  = false;
        btn.textContent = "ยืนยัน";
      }
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    loadRoutes();
  </script>
</body>
</html>
