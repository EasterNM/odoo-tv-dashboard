<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transport TV — เส้นทาง / วิธีส่ง</title>
  <link rel="stylesheet" href="/static/tv.css">
  <style>
    body { overflow: hidden; }
    main { padding: 0; overflow: hidden; min-height: 0; display: flex; flex-direction: column; }

    /* ── route row grid ── */
    .route-grid {
      display: flex;
      gap: 0.6rem;
      flex: 1;
      min-height: 0;
      padding: 0.6rem 0.8rem;
      box-sizing: border-box;
      overflow-x: auto;
      overflow-y: hidden;
      align-items: stretch;
    }

    /* ── route column ── */
    .route-col {
      flex: 0 0 260px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      min-height: 0;         /* อนุญาตให้ shrink ใน flex */
      overflow: hidden;
    }

    .route-header {
      padding: 0.5rem 0.8rem;
      background: #1158a8;
      border-radius: 10px 10px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .route-header.no-route { background: #444; }

    .route-name  { font-weight: bold; font-size: 1.05rem; }
    .route-count { font-size: 0.8rem; background: rgba(0,0,0,0.3);
                   padding: 0.1rem 0.45rem; border-radius: 10px; }

    .route-body { overflow-y: auto; flex: 1; padding: 0.4rem;
                  display: flex; flex-direction: column; gap: 0.5rem; }

    /* ── carrier group ── */
    .carrier-group {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 7px;
    }

    .carrier-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.3rem 0.6rem;
      background: #1a3a5c;
      font-size: 0.82rem;
    }
    .carrier-header.no-carrier { background: #2a2a2a; }
    .carrier-name  { font-weight: bold; color: #58a6ff; }
    .carrier-count { font-size: 0.75rem; color: #8b949e; }

    .carrier-body  { padding: 0.3rem; display: flex; flex-direction: column; gap: 0.25rem; }

    /* ── SO card ── */
    .so-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 5px;
      padding: 0.35rem 0.5rem;
    }
    .so-top  { display: flex; justify-content: space-between; align-items: center; }
    .so-name { font-weight: bold; color: #79c0ff; font-size: 0.88rem; }
    .so-cnt  { font-size: 0.72rem; color: #8b949e; }
    .so-cust { font-size: 0.75rem; color: #adbac7;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0.1rem 0; }

    .badges { display: flex; gap: 0.2rem; flex-wrap: wrap; margin-top: 0.2rem; }
    .badge  {
      font-size: 0.68rem; padding: 0.1rem 0.35rem; border-radius: 3px;
      border: 1px solid #444; display: flex; flex-direction: column; align-items: center;
    }
    .badge b    { font-size: 0.65rem; }
    .badge span { font-size: 0.6rem; }

    .state-assigned  .badge span { color: #3fb950; }
    .state-confirmed .badge span { color: #d29922; }
    .state-waiting   .badge span { color: #f85149; }
    .state-draft     .badge span { color: #8b949e; }

    /* package + qty info */
    .info-row { display: flex; gap: 0.35rem; margin-top: 0.25rem; flex-wrap: wrap; }
    .info-tag {
      font-size: 0.7rem; padding: 0.12rem 0.45rem; border-radius: 4px;
      font-weight: 600;
    }
    .info-tag.pkg { background: #0d2340; border: 1px solid #388bfd; color: #79c0ff; }
    .info-tag.qty { background: #0d2818; border: 1px solid #238636; color: #3fb950; }

    /* summary pills */
    .pill { font-size: 0.82rem; padding: 0.15rem 0.6rem; border-radius: 10px;
            background: #0d1117; border: 1px solid #30363d; }
    .pill b { color: #e6edf3; }

    /* ── pending-bill badge ── */
    #bill-badge {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 1.1rem 1.95rem;
      border-radius: 24px;
      background: #161b22;
      border: 1.5px solid #d29922;
      box-shadow: 0 4px 18px rgba(0,0,0,0.55);
      z-index: 999;
      cursor: default;
      transition: border-color 0.3s;
    }
    #bill-badge.has-bills {
      border-color: #f85149;
      animation: pulse-border 2s infinite;
    }
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 4px 18px rgba(248,81,73,0.25); }
      50%       { box-shadow: 0 4px 28px rgba(248,81,73,0.65); }
    }
    #bill-badge .bb-icon  { font-size: 3rem; line-height: 1; }
    #bill-badge .bb-body  { display: flex; flex-direction: column; line-height: 1.3; }
    #bill-badge .bb-label { font-size: 1.35rem; color: #8b949e; }
    #bill-badge .bb-count { font-size: 2.55rem; font-weight: bold; color: #e6edf3; }
    #bill-badge.has-bills .bb-count { color: #f85149; }
  </style>
</head>
<body class="store">
  <header>
    <h1>Transport — เส้นทาง / วิธีจัดส่ง</h1>
    <div id="summary" style="display:flex;gap:0.4rem;align-items:center;"></div>
    <div id="clock"></div>
    <div id="last-updated"></div>
  </header>

  <!-- pending-bill badge -->
  <div id="bill-badge">
    <span class="bb-icon">🧾</span>
    <div class="bb-body">
      <span class="bb-label">บิลรอรับ</span>
      <span class="bb-count" id="bill-count">—</span>
    </div>
  </div>

  <main>
    <div class="route-grid" id="grid">
      <p style="color:#555;padding:2rem;">กำลังโหลด...</p>
    </div>
  </main>

  <script src="/static/tv.js"></script>
  <script>
    function renderSoCard(s) {
      const badges = s.pickings.map(p => `
        <div class="badge state-${p.state}" title="${p.name}">
          <b>${p.name}</b>
          <span>${p.state_label}</span>
        </div>`).join("");

      const infoTags = [];
      if (s.packages > 0)
        infoTags.push(`<span class="info-tag pkg">📦 ${s.packages} package</span>`);
      if (s.qty > 0)
        infoTags.push(`<span class="info-tag qty">🛒 ${s.qty} ชิ้น</span>`);

      return `
        <div class="so-card">
          <div class="so-top">
            <span class="so-name">${s.so}</span>
            <span class="so-cnt">${s.count} ใบ</span>
          </div>
          <div class="so-cust">${s.customer}</div>
          ${infoTags.length ? `<div class="info-row">${infoTags.join("")}</div>` : ""}
          <div class="badges">${badges}</div>
        </div>`;
    }

    function renderCarrier(c) {
      const noCarrier = c.carrier === "ยังไม่ระบุวิธีส่ง";
      return `
        <div class="carrier-group">
          <div class="carrier-header ${noCarrier ? 'no-carrier' : ''}">
            <span class="carrier-name">${c.carrier}</span>
            <span class="carrier-count">${c.so_count} SO</span>
          </div>
          <div class="carrier-body">
            ${c.sos.map(renderSoCard).join("")}
          </div>
        </div>`;
    }

    function renderRoute(r) {
      const noRoute = r.route === "ยังไม่ระบุเส้นทาง";
      return `
        <div class="route-col">
          <div class="route-header ${noRoute ? 'no-route' : ''}">
            <span class="route-name">${r.route}</span>
            <span class="route-count">${r.so_count} SO</span>
          </div>
          <div class="route-body">
            ${r.carriers.map(renderCarrier).join("")}
          </div>
        </div>`;
    }

    async function fetchData() {
      try {
        const res   = await fetch("/api/transport/pickings");
        const json  = await res.json();
        const routes = json.data;

        const totalSO = routes.reduce((s, r) => s + r.so_count, 0);
        const named   = routes.filter(r => r.route !== "ยังไม่ระบุเส้นทาง");
        document.getElementById("summary").innerHTML = `
          <span class="pill">รวม <b>${totalSO}</b> SO</span>
          <span class="pill"><b>${named.length}</b> เส้นทาง</span>`;

        const grid = document.getElementById("grid");
        if (!routes.length) {
          grid.innerHTML = '<p style="color:#555;text-align:center;padding:2rem;">ไม่มีรายการ</p>';
          return;
        }
        grid.innerHTML = routes.map(renderRoute).join("");

        document.getElementById("last-updated").textContent =
          "อัปเดต: " + new Date().toLocaleTimeString("th-TH");
      } catch(e) { console.error(e); }
    }

    async function fetchPendingBills() {
      try {
        const res  = await fetch("/api/mobile/pending-receipts");
        const json = await res.json();
        const count = (json.data || []).length;
        const badge = document.getElementById("bill-badge");
        const countEl = document.getElementById("bill-count");
        countEl.textContent = count + " บิล";
        badge.classList.toggle("has-bills", count > 0);
      } catch(e) { console.error(e); }
    }

    startClock();
    fetchData();
    fetchPendingBills();
    setInterval(fetchData, 10000);
    setInterval(fetchPendingBills, 30000);
  </script>
</body>
</html>
